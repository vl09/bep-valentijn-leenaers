name: MyST GitHub Pages Deploy

on:
  push:
    branches: [main]

env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TYPST_FONT_PATHS: ${{ github.workspace }}/typst_template/src/assets/fonts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Typst template fonts
        uses: actions/checkout@v4
        with:
          repository: TUD-JB-OS/typst_template
          ref: main
          path: typst_template

      - name: Patch Typst template for superscript citations
        run: |
          MAIN=typst_template/src/main.typ
          if ! grep -q 'show cite:' "$MAIN"; then
            sed -i '/show link: set text/a\  show cite: it => super(it)' "$MAIN"
          fi
          
      - name: Patch Typst template TOC styling
        run: python3 .github/scripts/patch_typst_toc.py

      - name: Patch Typst template figure numbering
        run: cp .github/typst_patches/main.typ typst_template/src/main.typ
        
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install MyST
        run: npm install -g mystmd

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install jupyter-server nbclient nbformat ipykernel jupyter-client ipython
          pip install matplotlib numpy pandas scipy plotly
          python -m ipykernel install --user --name=python3

      - name: Install ImageMagick
        timeout-minutes: 5
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            -o Acquire::Retries=5 \
            -o Acquire::http::Timeout=60 \
            imagemagick

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Build PDF
        run: myst build --typst

      - name: Recompile thesis PDF with chapter-prefixed subpar figures
        run: python3 .github/scripts/recompile_thesis_pdf.py

      - name: Verify PDF export
        run: |
          if ! compgen -G "exports/*.pdf" > /dev/null; then
            echo "Typst export failed: no PDF found in exports/"
            exit 1
          fi

      - name: Upload Output PDF as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Output PDF
          path: exports/*.pdf
          compression-level: 0

      - name: Write build errors to errorlog.md
        if: failure()
        run: |
          echo "# PDF Build Error Log" > errorlog.md
          echo "" >> errorlog.md
          echo "**Build time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> errorlog.md
          echo "" >> errorlog.md
          echo "Typst export failed. Re-run \`myst build --typst\` locally to inspect the full log." >> errorlog.md

      - name: Build HTML Assets
        run: myst build --html --execute

      - name: Copy PDF exports into site
        run: |
          mkdir -p _build/html/exports
          if compgen -G "exports/*.pdf" > /dev/null; then
            cp exports/*.pdf _build/html/exports/
          else
            echo "No PDF exports to copy; site will deploy without PDF downloads."
          fi

      - name: Remove stale Pages artifact
        uses: geekyeggo/delete-artifact@v6
        with:
          name: github-pages
          failOnError: false

      - name: Upload HTML artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
